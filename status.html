<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedEx | Shipment Status</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .header { background: #4D148C; color: white; padding: 20px; text-align: center; border-bottom: 5px solid #ff6600; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-badge { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; font-weight: bold; text-align: center; margin-bottom: 20px; border: 1px solid #ffeeba; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { font-weight: bold; color: #555; }
        .value { color: #333; }
        .fee-box { background: #e7f3ff; padding: 15px; border-radius: 5px; margin-top: 20px; text-align: center; }
        .btn-pay { display: block; background: #ff6600; color: white; text-align: center; padding: 15px; border-radius: 4px; text-decoration: none; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        .btn-pay:hover { background: #e65c00; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://www.fedex.com/content/dam/fedex-com/logos/logo.png" width="100" alt="FedEx Logo">
    </div>
    <div class="container">
        <div class="status-badge">⚠️ ACTION REQUIRED: PENDING REDELIVERY</div>
        
        <div class="info-row">
            <span class="label">Tracking Number:</span>
            <span class="value" id="track-id">FX-4492-0032</span>
        </div>
        <div class="info-row">
            <span class="label">Current Status:</span>
            <span class="value">At Local Warehouse</span>
        </div>
        <div class="info-row">
            <span class="label">Reason:</span>
            <span class="value">Unverifiable Address</Address></span>
        </div>

        <div class="fee-box">
            <p style="margin: 0; font-size: 14px; color: #555;">Required Fee for Redelivery:</p>
            <h2 style="margin: 5px 0; color: #333;">$1.45</h2>
        </div>

        <a href="pay.html" class="btn-pay">Pay Fee & Schedule Delivery</a>
        
        <p style="font-size: 12px; color: #999; text-align: center; margin-top: 20px;">
            Your package will be held for 48 hours before being returned to sender.
        </p>
    </div>
    <script>
    window.onload = function() {
        // 1. Grab the URL
        const urlParams = new URLSearchParams(window.location.search);
        const trackId = urlParams.get('trackid');
        
        console.log("Captured Track ID:", trackId); // This helps us debug in the browser console

        // 2. Find the element and update it
        const displayElement = document.getElementById('track-id');
        
        if (trackId && displayElement) {
            displayElement.innerText = decodeURIComponent(trackId);
        } else {
            console.log("Could not find the ID in URL or the element on page.");
        }
    };
</script>
</body>
</html>
